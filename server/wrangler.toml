name = "buildle-api"
main = "src/worker.js"
compatibility_date = "2026-05-01"

# Workers Logs: persistent invocation logs + query builder in the dashboard.
# Free plan includes 200k events/day with 3-day retention — plenty at launch
# scale; drop head_sampling_rate if we ever approach the cap.
[observability]
enabled = true
head_sampling_rate = 1

# TOKEN_SECRET is a real secret: production gets it via `wrangler secret put
# TOKEN_SECRET`; local dev reads .dev.vars (git-ignored). Never put it here —
# a [vars] entry would shadow the secret on every deploy.

[[durable_objects.bindings]]
name = "PLAZA"
class_name = "IslandDO"

# Live wanderers (CONTRACT-W4): one ephemeral, in-memory room per island that
# relays positions over WebSockets. Plain DO (no SQLite) — presence is never
# persisted; a tab closing forgets you.
[[durable_objects.bindings]]
name = "PRESENCE"
class_name = "PresenceDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["IslandDO"]

# The free Workers plan requires every Durable Object to be SQLite-backed, even
# though PresenceDO keeps all state in memory (it never touches ctx.storage.sql).
[[migrations]]
tag = "v2"
new_sqlite_classes = ["PresenceDO"]
